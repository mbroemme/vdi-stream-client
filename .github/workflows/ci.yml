name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  # configure.ac requires the ParsecCursor.hidden SDK field. Pin this to a
  # Parsec SDK tag or commit SHA if reproducible builds are required.
  PARSEC_SDK_REF: master

jobs:
  lint:
    name: Lint and static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: debian:trixie-slim
    defaults:
      run:
        shell: bash

    steps:
      - name: Install lint dependencies
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            wget
          mkdir -p /etc/apt/keyrings
          wget -qO /etc/apt/keyrings/apt.llvm.org.asc https://apt.llvm.org/llvm-snapshot.gpg.key
          chmod 0644 /etc/apt/keyrings/apt.llvm.org.asc
          echo 'deb [signed-by=/etc/apt/keyrings/apt.llvm.org.asc] http://apt.llvm.org/trixie/ llvm-toolchain-trixie-22 main' > /etc/apt/sources.list.d/llvm.list
          apt-get update
          apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            bear \
            build-essential \
            clang-22 \
            clang-format-22 \
            clang-tidy-22 \
            git \
            libsdl3-dev \
            libsdl3-ttf-dev \
            libusb-1.0-0-dev \
            libusbredirhost-dev \
            libusbredirparser-dev \
            libx11-dev \
            pkg-config \
            python3 \
            python3-yaml \
            shellcheck \
            tar

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check workflow syntax
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import yaml

          for path in sorted(Path('.github/workflows').glob('*.yml')):
              with path.open('r', encoding='utf-8') as stream:
                  yaml.safe_load(stream)
          PY

      - name: Check shell scripts
        run: |
          set -euxo pipefail
          sh -n autogen.sh
          bash -n tools/parsec-login
          shellcheck -S error autogen.sh tools/parsec-login

      - name: Check tracked text whitespace
        run: |
          set -euxo pipefail
          if git grep -nI '[[:blank:]]$' -- .; then
            echo 'Trailing whitespace found.' >&2
            exit 1
          fi

      - name: Check C formatting
        run: |
          set -euxo pipefail
          mapfile -t sources < <(git ls-files 'src/*.c' 'src/*.h' 'include/*.h')
          clang-format-22 --dry-run --Werror "${sources[@]}"

      - name: Generate build system
        run: |
          set -euxo pipefail
          sh autogen.sh

      - name: Download Parsec SDK
        run: |
          set -euxo pipefail
          wget -O parsec-sdk.tar.gz "https://github.com/mbroemme/parsec-sdk/archive/${PARSEC_SDK_REF}.tar.gz"
          mkdir parsec-sdk-src
          tar xzf parsec-sdk.tar.gz -C parsec-sdk-src --strip-components=1

      - name: Configure for clang-tidy
        run: |
          set -euxo pipefail
          mv parsec-sdk-src parsec-sdk
          ./configure --prefix=/usr CC=clang-22

      - name: Build compilation database
        run: |
          set -euxo pipefail
          bear -- make -j"$(nproc)" V=1

      - name: Run clang-tidy
        run: |
          set -euxo pipefail
          mapfile -t sources < <(git ls-files 'src/*.c' 'src/*.h' 'include/*.h')
          clang-tidy-22 --quiet -p . "${sources[@]}"

  build:
    name: Build (${{ matrix.linkage }} linking)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: debian:trixie-slim
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        linkage:
          - shared
          - dso

    steps:
      - name: Install build dependencies
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            wget
          mkdir -p /etc/apt/keyrings
          wget -qO /etc/apt/keyrings/apt.llvm.org.asc https://apt.llvm.org/llvm-snapshot.gpg.key
          chmod 0644 /etc/apt/keyrings/apt.llvm.org.asc
          echo 'deb [signed-by=/etc/apt/keyrings/apt.llvm.org.asc] http://apt.llvm.org/trixie/ llvm-toolchain-trixie-22 main' > /etc/apt/sources.list.d/llvm.list
          apt-get update
          apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            clang-22 \
            git \
            libsdl3-dev \
            libsdl3-ttf-dev \
            libusb-1.0-0-dev \
            libusbredirhost-dev \
            libusbredirparser-dev \
            libx11-dev \
            pkg-config \
            tar

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate build system
        run: |
          set -euxo pipefail
          sh autogen.sh

      - name: Download Parsec SDK
        run: |
          set -euxo pipefail
          wget -O parsec-sdk.tar.gz "https://github.com/mbroemme/parsec-sdk/archive/${PARSEC_SDK_REF}.tar.gz"
          mkdir parsec-sdk-src
          tar xzf parsec-sdk.tar.gz -C parsec-sdk-src --strip-components=1

      - name: Install Parsec SDK for shared linking
        if: matrix.linkage == 'shared'
        run: |
          set -euxo pipefail
          install -D -m 0755 parsec-sdk-src/sdk/linux/libparsec.so /usr/lib/parsec/sdk/linux/libparsec.so
          install -D -m 0644 parsec-sdk-src/sdk/parsec.h /usr/include/parsec/sdk/parsec.h
          ln -sf parsec/sdk/linux/libparsec.so /usr/lib/libparsec.so
          ln -sf sdk/parsec.h /usr/include/parsec/parsec.h
          ldconfig

      - name: Prepare Parsec SDK for DSO linking
        if: matrix.linkage == 'dso'
        run: |
          set -euxo pipefail
          mv parsec-sdk-src parsec-sdk

      - name: Configure
        run: |
          set -euxo pipefail
          ./configure --prefix=/usr CC=clang-22

      - name: Build
        run: |
          set -euxo pipefail
          make -j"$(nproc)" V=1

      - name: Check
        run: |
          set -euxo pipefail
          make check V=1
